services:
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      OMNI_LOG_LEVEL: ${OMNI_LOG_LEVEL:-INFO}
      OMNI_METERED_APP_NAME: ${OMNI_METERED_APP_NAME:-}
      OMNI_METERED_CREDENTIAL_API_KEY: ${OMNI_METERED_CREDENTIAL_API_KEY:-}
      OMNI_METERED_REGION: ${OMNI_METERED_REGION:-}
      OMNI_METERED_CACHE_TTL_SECONDS: ${OMNI_METERED_CACHE_TTL_SECONDS:-300}
      OMNI_METERED_FETCH_TIMEOUT_SECONDS: ${OMNI_METERED_FETCH_TIMEOUT_SECONDS:-5}
      OMNI_USE_OPENRELAY: ${OMNI_USE_OPENRELAY:-0}
      OMNI_OPENRELAY_STUN_URI: ${OMNI_OPENRELAY_STUN_URI:-stun:openrelay.metered.ca:80}
      OMNI_OPENRELAY_TURN_URIS: ${OMNI_OPENRELAY_TURN_URIS:-turn:openrelay.metered.ca:80,turn:openrelay.metered.ca:443,turn:openrelay.metered.ca:443?transport=tcp}
      OMNI_OPENRELAY_USERNAME: ${OMNI_OPENRELAY_USERNAME:-openrelayproject}
      OMNI_OPENRELAY_CREDENTIAL: ${OMNI_OPENRELAY_CREDENTIAL:-openrelayproject}
      OMNI_ICE_SERVERS_JSON: ${OMNI_ICE_SERVERS_JSON:-}
      OMNI_STUN_SERVERS: ${OMNI_STUN_SERVERS:-}
      OMNI_TURN_URIS: ${OMNI_TURN_URIS:-}
      OMNI_TURN_USERNAME: ${OMNI_TURN_USERNAME:-}
      OMNI_TURN_CREDENTIAL: ${OMNI_TURN_CREDENTIAL:-}
      OMNI_TURN_REST_SECRET: ${OMNI_TURN_REST_SECRET:-}
      OMNI_TURN_REST_TTL_SECONDS: ${OMNI_TURN_REST_TTL_SECONDS:-3600}
      OMNI_TURN_REST_USERNAME_PREFIX: ${OMNI_TURN_REST_USERNAME_PREFIX:-omniportal}
    ports:
      - "8000:8000"
